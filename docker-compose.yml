services:
  monitor:
    image: gcr.io/distroless/static-debian12
    entrypoint: ["/monitor"]
    container_name: volvo-charge-monitor
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./monitor:/monitor:ro
      - token-data:/data

    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  token-data:
