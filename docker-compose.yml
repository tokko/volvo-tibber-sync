services:
  monitor:
    image: gcr.io/distroless/static-debian12
    entrypoint: ["/monitor"]
    container_name: volvo-charge-monitor
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./monitor:/monitor:ro
      # Bind-mount so ./data/token.json on the host is visible inside the
      # container. The oauth helper seeds token.json here so the monitor
      # never has to fall back to the one-shot .env refresh token.
      - ./data:/data

    # Expose HTTP endpoints (/healthz, /state, /logs) when HTTP_ADDR=:8080 in
    # .env. Host port 8082 → container port 8080 (8080 is used by another
    # container on this host). Comment out to keep the service fully private.
    ports:
      - "8082:8080"

    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

